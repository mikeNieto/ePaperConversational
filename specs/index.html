<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYLYS — Voice Assistant</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --accent: #a78bfa;
    --accent-dim: #7c3aed;
    --user-bg: #1e1b4b;
    --agent-bg: #1a1a1a;
    --error: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .chat-container {
    width: 100%;
    max-width: 720px;
    height: 95vh;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--surface);
  }
  .header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #22c55e;
  }
  .header h1 { font-size: 1.1rem; font-weight: 600; }
  .header .status-text { font-size: 0.75rem; color: #888; margin-left: auto; }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 0.95rem;
    animation: fadeIn 0.2s ease;
    word-break: break-word;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
  }
  .msg.agent {
    align-self: flex-start;
    background: var(--agent-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.status {
    align-self: center;
    font-size: 0.8rem;
    color: #888;
    background: none;
    border: none;
    padding: 4px 8px;
  }
  .msg.error {
    align-self: center;
    color: var(--error);
    font-size: 0.8rem;
    background: none;
  }
  .audio-msg {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .audio-msg audio { height: 32px; }
  .input-area {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .input-area input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 24px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-area input:focus { border-color: var(--accent); }
  button {
    border: none;
    cursor: pointer;
    border-radius: 50%;
    width: 42px; height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    transition: all 0.15s;
  }
  #mic-btn {
    background: var(--border);
    color: var(--text);
  }
  #mic-btn.recording {
    background: var(--error);
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
    50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
  }
  #send-btn {
    background: var(--accent);
    color: #fff;
  }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .ws-btn {
    margin-left: auto;
    background: var(--border);
    color: var(--text);
    font-size: 1rem;
  }
  .ws-btn:hover { background: var(--accent); color: #fff; }
  .status-connecting { color: #facc15; }
  .status-connected { color: #22c55e; }
  .status-error { color: #ef4444; }
  #status-dot.status-connecting { background: #facc15; }
  #status-dot.status-connected { background: #22c55e; }
  #status-dot.status-error { background: #ef4444; }
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">
    <div class="dot" id="status-dot"></div>
    <h1>SYLYS</h1>
    <span class="status-text" id="status-text">Connecting...</span>
    <button id="ws-btn" class="ws-btn" title="Reconnect" onclick="reconnect()">&#8635;</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <button id="mic-btn" title="Hold to record">&#127908;</button>
    <input type="text" id="text-input" placeholder="Type a message..." autofocus>
    <button id="send-btn" title="Send">&#10148;</button>
  </div>
</div>

<script>
(function() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${location.host}/ws`;

  let ws = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;
  let currentAgentDiv = null;
  let reconnecting = false;
  let pendingMimeType = 'audio/wav';

  const messagesEl = document.getElementById('messages');
  const textInput = document.getElementById('text-input');
  const sendBtn = document.getElementById('send-btn');
  const micBtn = document.getElementById('mic-btn');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');

  textInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendText();
  });
  sendBtn.addEventListener('click', sendText);

  function setStatus(state, text) {
    statusText.textContent = text;
    statusDot.className = 'dot status-' + state;
  }

  function reconnect() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.close();
    }
    reconnecting = false;
    setStatus('connecting', 'Connecting...');
    connect();
  }

  window.reconnect = reconnect;

  function addMessage(role, content, extra) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    if (extra) div.className += ' ' + extra;
    if (extra === 'status' || extra === 'error') {
      div.textContent = content;
    } else {
      div.textContent = content;
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addAudioMessage(audioBytes) {
    const blob = new Blob([audioBytes], { type: pendingMimeType });
    const url = URL.createObjectURL(blob);
    const div = document.createElement('div');
    div.className = 'msg agent audio-msg';
    const audio = document.createElement('audio');
    audio.controls = true;
    audio.autoplay = true;
    audio.src = url;
    div.appendChild(audio);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function sendText() {
    const text = textInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    addMessage('user', text);
    ws.send(JSON.stringify({ type: 'text', content: text }));
    textInput.value = '';
    sendBtn.disabled = true;
  }

  async function startRecording() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true }
      });
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      audioChunks = [];

      mediaRecorder.ondataavailable = function(e) {
        if (e.data.size > 0) {
          audioChunks.push(e.data);
        }
      };

      mediaRecorder.onstop = function() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          blob.arrayBuffer().then(function(buf) {
            ws.send(buf);
            ws.send(JSON.stringify({ type: 'audio_end' }));
          });
        }
        stream.getTracks().forEach(t => t.stop());
      };

      mediaRecorder.start(100);
      isRecording = true;
      micBtn.classList.add('recording');
      micBtn.textContent = '\u23F9';
      addMessage('status', 'Recording...', 'status');
    } catch (e) {
      addMessage('error', 'Microphone access denied', 'error');
    }
  }

  function stopRecording() {
    if (!isRecording || !mediaRecorder) return;
    mediaRecorder.stop();
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = '\uD83C\uDFA4';
    addMessage('status', 'Processing...', 'status');
  }

  micBtn.addEventListener('mousedown', startRecording);
  micBtn.addEventListener('mouseup', stopRecording);
  micBtn.addEventListener('touchstart', function(e) { e.preventDefault(); startRecording(); });
  micBtn.addEventListener('touchend', stopRecording);
  micBtn.addEventListener('mouseleave', function() {
    if (isRecording) stopRecording();
  });

  function connect() {
    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
      setStatus('connected', 'Connected');
      sendBtn.disabled = false;
      reconnecting = false;
    };

    ws.onmessage = function(event) {
      if (event.data instanceof ArrayBuffer) {
        addAudioMessage(new Uint8Array(event.data));
        sendBtn.disabled = false;
        return;
      }
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'audio_info') {
          pendingMimeType = data.mime_type || 'audio/wav';
        } else if (data.type === 'status') {
          if (data.state === 'transcribing') {
            addMessage('status', 'Transcribing...', 'status');
          } else if (data.state === 'thinking') {
            addMessage('status', 'Thinking...', 'status');
          } else if (data.state === 'speaking') {
            addMessage('status', 'Speaking...', 'status');
          }
        } else if (data.type === 'token') {
          if (!currentAgentDiv) {
            currentAgentDiv = addMessage('agent', '');
          }
          currentAgentDiv.textContent += data.content;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        } else if (data.type === 'text') {
          if (currentAgentDiv) {
            currentAgentDiv.textContent = data.content;
          } else {
            addMessage('agent', data.content);
          }
          currentAgentDiv = null;
          sendBtn.disabled = false;
        } else if (data.type === 'done') {
          currentAgentDiv = null;
          sendBtn.disabled = false;
        } else if (data.type === 'error') {
          addMessage('error', data.message, 'error');
          sendBtn.disabled = false;
        }
      } catch(e) {}
    };

    ws.onclose = function() {
      setStatus('error', 'Disconnected');
      sendBtn.disabled = true;
      if (!reconnecting) {
        reconnecting = true;
        setTimeout(connect, 3000);
      }
    };

    ws.onerror = function() {
      setStatus('error', 'Connection error');
    };
  }

  setStatus('connecting', 'Connecting...');
  connect();
})();
</script>
</body>
</html>
